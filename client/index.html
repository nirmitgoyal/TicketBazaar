    <!-- Inline error suppression - loads immediately before anything else -->
    <script>
      (function () {
        // Suppress any console errors related to WebSockets
        var originalConsoleError = console.error;
        console.error = function () {
          var errorText = Array.from(arguments).join(" ");
          if (
            errorText.includes("WebSocket") ||
            errorText.includes("DOMException") ||
            errorText.includes("TypeError") ||
            errorText.includes("Uncaught")
          ) {
            return;
          }
          return originalConsoleError.apply(console, arguments);
        };

        // Also catch unhandled rejections
        window.addEventListener(
          "unhandledrejection",
          function (e) {
            e.preventDefault();
            return false;
          },
          true,
        );
      })();
    </script>
