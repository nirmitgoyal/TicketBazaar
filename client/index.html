    <!-- Enhanced error suppression - loads immediately before anything else -->
    <script>
      (function () {
        'use strict';
        
        // Comprehensive console error suppression
        var originalConsoleError = console.error;
        console.error = function () {
          var errorText = Array.from(arguments).join(" ");
          if (
            errorText.includes("WebSocket") ||
            errorText.includes("DOMException") ||
            errorText.includes("TypeError") ||
            errorText.includes("Uncaught") ||
            errorText.includes("Script error") ||
            errorText.includes("Failed to fetch dynamically imported module") ||
            errorText.includes("gmp-") ||
            errorText.includes("already defined") ||
            errorText.includes("Loading chunk") ||
            errorText.includes("listener indicated an asynchronous response") ||
            errorText.includes("message channel closed before a response was received") ||
            errorText.includes("Extension context invalidated") ||
            errorText.includes("chrome-extension://")
          ) {
            return;
          }
          return originalConsoleError.apply(console, arguments);
        };

        // Suppress Google Maps warnings
        var originalConsoleWarn = console.warn;
        console.warn = function () {
          var warnText = Array.from(arguments).join(" ");
          if (
            warnText.includes("already defined") ||
            warnText.includes("gmp-") ||
            warnText.includes("Element with name")
          ) {
            return;
          }
          return originalConsoleWarn.apply(console, arguments);
        };

        // Comprehensive Chrome extension error blocking
        if (typeof chrome !== 'undefined' && chrome.runtime) {
          // Override chrome.runtime methods to prevent extension errors
          var originalSendMessage = chrome.runtime.sendMessage;
          chrome.runtime.sendMessage = function() {
            try {
              var result = originalSendMessage.apply(this, arguments);
              if (result && typeof result.catch === 'function') {
                return result.catch(function(error) {
                  if (error && error.message && (
                    error.message.includes('listener indicated an asynchronous response') ||
                    error.message.includes('message channel closed before a response was received') ||
                    error.message.includes('Extension context invalidated')
                  )) {
                    return Promise.resolve();
                  }
                  throw error;
                });
              }
              return result;
            } catch (error) {
              if (error && error.message && (
                error.message.includes('listener indicated an asynchronous response') ||
                error.message.includes('message channel closed before a response was received') ||
                error.message.includes('Extension context invalidated')
              )) {
                return Promise.resolve();
              }
              throw error;
            }
          };

          // Block problematic extension properties
          try {
            Object.defineProperty(chrome.runtime, 'sendMessage', {
              value: chrome.runtime.sendMessage,
              writable: false,
              configurable: false
            });
          } catch (e) {
            // Ignore if we can't lock the property
          }
        }

        // Enhanced unhandled rejection handling
        window.addEventListener(
          "unhandledrejection",
          function (e) {
            var message = e.reason?.message || e.reason || '';
            if (
              message.includes("WebSocket") ||
              message.includes("wss://") ||
              message.includes("ws://") ||
              message.includes("Failed to fetch dynamically imported module") ||
              message.includes("Script error") ||
              message.includes("Loading chunk") ||
              message.includes("gmp-") ||
              message.includes("listener indicated an asynchronous response") ||
              message.includes("message channel closed before a response was received") ||
              message.includes("Extension context invalidated") ||
              message.includes("chrome-extension://")
            ) {
              e.preventDefault();
              return false;
            }
          },
          true,
        );

        // Handle general errors
        window.addEventListener(
          "error",
          function (e) {
            if (
              e.message && (
                e.message.includes("WebSocket") ||
                e.message.includes("wss://") ||
                e.message.includes("ws://") ||
                e.message.includes("Script error") ||
                e.message.includes("Failed to fetch dynamically imported module") ||
                e.message.includes("Loading chunk") ||
                e.message.includes("gmp-") ||
                e.message.includes("listener indicated an asynchronous response") ||
                e.message.includes("message channel closed before a response was received") ||
                e.message.includes("Extension context invalidated") ||
                e.message.includes("chrome-extension://")
              )
            ) {
              e.preventDefault();
              return false;
            }
          },
          true,
        );
      })();
    </script>
