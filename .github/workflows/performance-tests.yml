name: Performance Tests

on:
  push:
    branches: [ main ]
  schedule:
    # Run performance tests weekly on Sundays at 3 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      test_duration:
        description: 'Test duration in minutes'
        required: false
        default: '10'
        type: string

jobs:
  performance-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install chromium --with-deps

    - name: Build application
      run: npm run build

    - name: Start application
      run: |
        npm run start &
        npx wait-on http://localhost:5000 --timeout 60000
      env:
        NODE_ENV: production
        DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

    - name: Run performance baseline tests
      run: |
        npx playwright test tests/e2e/05-ui-animations.spec.ts --project=chromium --grep="should handle scroll animations"
        npx playwright test tests/e2e/01-navigation-routing.spec.ts --project=chromium --grep="should navigate between key pages"
      env:
        PERFORMANCE_MODE: true

    - name: Load test with concurrent users
      run: |
        # Run multiple instances of critical user journeys
        for i in {1..5}; do
          npx playwright test tests/e2e/07-user-journeys.spec.ts --project=chromium --grep="should complete ticket discovery" &
        done
        wait

    - name: Memory and resource monitoring
      run: |
        echo "Performance test completed"
        # Resource usage would be monitored here in a real environment

    - name: Upload performance results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-results
        path: test-results/
        retention-days: 14