name: Visual Regression Tests

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install chromium --with-deps

    - name: Build application
      run: |
        echo "Building application for testing..."
        npm run build
        echo "Build completed successfully"
      env:
        VITE_GOOGLE_MAPS_API_KEY: "demo-key-for-testing"
        NODE_ENV: test

    - name: Setup PostgreSQL
      uses: harmon758/postgresql-action@v1
      with:
        postgresql version: '13'
        postgresql db: test
        postgresql user: test
        postgresql password: test

    - name: Wait for PostgreSQL to be ready
      run: |
        until pg_isready -h localhost -p 5432 -U test; do
          echo "Waiting for PostgreSQL to start..."
          sleep 2
        done
        echo "PostgreSQL is ready"

    - name: Initialize test database
      run: |
        export DATABASE_URL="postgresql://test:test@localhost:5432/test"
        npx tsx scripts/init-test-db.ts
      env:
        NODE_ENV: test

    - name: Start application
      run: |
        export DATABASE_URL="postgresql://test:test@localhost:5432/test"
        export PORT=5001
        export NODE_ENV=test
        export VITE_GOOGLE_MAPS_API_KEY="demo-key-for-testing"
        
        echo "Starting application server..."
        npm run start &
        SERVER_PID=$!
        
        echo "Waiting for server to be ready..."
        npx wait-on http://localhost:5001 --timeout 60000 || {
          echo "Server failed to start, checking logs..."
          ps aux | grep node || true
          curl -f http://localhost:5001 || echo "Server not responding"
          kill $SERVER_PID || true
          exit 1
        }
        echo "Server is ready and responding"
      env:
        NODE_ENV: test
        DATABASE_URL: "postgresql://test:test@localhost:5432/test"
        VITE_GOOGLE_MAPS_API_KEY: "demo-key-for-testing"

    - name: Run visual regression tests
      run: |
        echo "Running visual regression tests..."
        if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
          echo "Updating snapshots on main branch"
          npx playwright test tests/e2e/05-ui-animations.spec.ts --project=chromium --update-snapshots
        else
          echo "Running comparison tests"
          npx playwright test tests/e2e/05-ui-animations.spec.ts --project=chromium
        fi
      env:
        CI: true
        DATABASE_URL: "postgresql://test:test@localhost:5432/test"

    - name: Upload visual differences
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: visual-regression-diff
        path: |
          test-results/
          playwright-report/
        retention-days: 7

    - name: Comment on PR with visual changes
      if: github.event_name == 'pull_request' && failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '⚠️ Visual regression detected. Please review the visual differences in the test artifacts.'
          })