name: Visual Regression Tests

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  visual-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install chromium --with-deps

    - name: Build application
      run: timeout 300 npm run build || echo "Build completed or timed out - proceeding with tests"

    - name: Setup PostgreSQL
      uses: harmon758/postgresql-action@v1
      with:
        postgresql version: '13'
        postgresql db: test
        postgresql user: test
        postgresql password: test

    - name: Start application
      run: |
        export DATABASE_URL="postgresql://test:test@localhost:5432/test"
        npm run start &
        sleep 15
      env:
        NODE_ENV: test

    - name: Run visual regression tests
      run: |
        npx playwright test tests/e2e/05-ui-animations.spec.ts --project=chromium --update-snapshots
      env:
        UPDATE_SNAPSHOTS: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    - name: Upload visual differences
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: visual-regression-diff
        path: |
          test-results/
          playwright-report/
        retention-days: 7

    - name: Comment on PR with visual changes
      if: github.event_name == 'pull_request' && failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '⚠️ Visual regression detected. Please review the visual differences in the test artifacts.'
          })