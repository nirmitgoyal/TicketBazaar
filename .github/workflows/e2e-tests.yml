name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        test-suite: [navigation, forms, realtime, maps, ui, errors, journeys]
        browser: [chromium, firefox]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Setup PostgreSQL
      uses: harmon758/postgresql-action@v1
      with:
        postgresql version: '13'
        postgresql db: test
        postgresql user: test
        postgresql password: test

    - name: Wait for PostgreSQL to be ready
      run: |
        until pg_isready -h localhost -p 5432 -U test; do
          echo "Waiting for PostgreSQL to start..."
          sleep 2
        done
        echo "PostgreSQL is ready"

    - name: Initialize test database
      run: |
        export DATABASE_URL="postgresql://test:test@localhost:5432/test"
        npx tsx scripts/init-test-db.ts
        echo "DATABASE_URL=postgresql://test:test@localhost:5432/test" >> $GITHUB_ENV
        echo "NODE_ENV=test" >> $GITHUB_ENV
        
    - name: Build application
      run: timeout 300 npm run build || echo "Build completed or timed out - proceeding with tests"

    - name: Start application server
      run: |
        export PORT=5001
        npm run start npm run start &
        sleep 10
        # Wait for server to be ready
        npx wait-on http://localhost:5001 --timeout 60000

    - name: Run E2E tests
      run: |
        case "${{ matrix.test-suite }}" in
          "navigation")
            npx playwright test tests/e2e/01-navigation-routing.spec.ts --project=${{ matrix.browser }}
            ;;
          "forms")
            npx playwright test tests/e2e/02-form-validation.spec.ts --project=${{ matrix.browser }}
            ;;
          "realtime")
            npx playwright test tests/e2e/03-realtime-websocket.spec.ts --project=${{ matrix.browser }}
            ;;
          "maps")
            npx playwright test tests/e2e/04-maps-geolocation.spec.ts --project=${{ matrix.browser }}
            ;;
          "ui")
            npx playwright test tests/e2e/05-ui-animations.spec.ts --project=${{ matrix.browser }}
            ;;
          "errors")
            npx playwright test tests/e2e/06-error-handling.spec.ts --project=${{ matrix.browser }}
            ;;
          "journeys")
            npx playwright test tests/e2e/07-user-journeys.spec.ts --project=${{ matrix.browser }}
            ;;
        esac
      env:
        CI: true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.test-suite }}-${{ matrix.browser }}
        path: |
          test-results/
          playwright-report/
        retention-days: 7

    - name: Upload failure screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: failure-screenshots-${{ matrix.test-suite }}-${{ matrix.browser }}
        path: test-results/screenshots/
        retention-days: 14

  test-report:
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always()
    
    steps:
    - name: Download all test results
      uses: actions/download-artifact@v4
      with:
        path: all-test-results

    - name: Generate comprehensive test report
      run: |
        echo "# E2E Test Results" > test-summary.md
        echo "" >> test-summary.md
        echo "## Test Matrix Results" >> test-summary.md
        echo "" >> test-summary.md
        
        # Check for test results and generate summary
        for suite in navigation forms realtime maps ui errors journeys; do
          echo "### $suite Tests" >> test-summary.md
          for browser in chromium firefox; do
            if [ -d "all-test-results/test-results-$suite-$browser" ]; then
              echo "- ✅ $browser: Passed" >> test-summary.md
            else
              echo "- ❌ $browser: Failed" >> test-summary.md
            fi
          done
          echo "" >> test-summary.md
        done

    - name: Comment test results on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const testSummary = fs.readFileSync('test-summary.md', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: testSummary
          });