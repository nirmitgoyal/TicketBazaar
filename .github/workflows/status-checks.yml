name: Required Status Checks

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  # Branch protection status check
  branch-protection-check:
    name: Branch Protection Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Check commit message format
      run: |
        COMMIT_MSG=$(git log -1 --pretty=format:'%s')
        echo "Commit message: $COMMIT_MSG"
        
        # Check for conventional commit format
        if [[ $COMMIT_MSG =~ ^(feat|fix|docs|style|refactor|test|chore)(\(.+\))?: .+ ]]; then
          echo "✅ Commit message follows conventional format"
        else
          echo "⚠️ Commit message doesn't follow conventional format"
        fi
      
    - name: Check for required files
      run: |
        REQUIRED_FILES=("README.md" "package.json" "playwright.config.ts" ".github/workflows/ci.yml")
        
        for file in "${REQUIRED_FILES[@]}"; do
          if [ -f "$file" ]; then
            echo "✅ $file exists"
          else
            echo "❌ $file is missing"
            exit 1
          fi
        done
        
    - name: Validate test structure
      run: |
        if [ -d "tests/e2e/specs" ]; then
          TEST_COUNT=$(find tests/e2e/specs -name "*.spec.ts" | wc -l)
          echo "✅ Found $TEST_COUNT E2E test files"
          
          if [ $TEST_COUNT -lt 5 ]; then
            echo "⚠️ Minimum 5 test files expected for comprehensive coverage"
          fi
        else
          echo "❌ E2E test directory structure missing"
          exit 1
        fi

  # Code quality gates
  code-quality-gates:
    name: Code Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install jq for JSON parsing
      run: sudo apt-get update && sudo apt-get install -y jq
      
    - name: Check package vulnerabilities
      run: |
        # Run npm audit and capture exit code
        if npm audit --audit-level=high > audit_output.txt 2>&1; then
          echo "✅ No high or critical vulnerabilities found"
        else
          AUDIT_EXIT_CODE=$?
          echo "Package audit completed with exit code: $AUDIT_EXIT_CODE"
          
          # Check if vulnerabilities exist
          if grep -q "vulnerabilities" audit_output.txt; then
            echo "⚠️ Vulnerabilities found - review required"
            cat audit_output.txt
          else
            echo "✅ No critical vulnerabilities found"
          fi
        fi
      
    - name: TypeScript compilation check
      run: |
        npm run check
        echo "✅ TypeScript compilation successful"
        
    - name: Build verification
      run: |
        # Clean any existing build artifacts
        rm -rf dist
        
        # Run build command
        npm run build
        echo "✅ Build completed successfully"
        
        # Check build output with detailed logging
        echo "Checking build artifacts..."
        if [ -d "dist" ]; then
          echo "✅ dist directory exists"
          echo "Contents of dist directory:"
          ls -la dist/
          
          if [ "$(ls -A dist)" ]; then
            echo "✅ Build artifacts generated successfully"
          else
            echo "❌ dist directory is empty"
            echo "Build script output should generate files in dist/"
            exit 1
          fi
        else
          echo "❌ dist directory not created"
          echo "Current directory contents:"
          ls -la
          exit 1
        fi

  # Test coverage gates
  test-coverage-gates:
    name: Test Coverage Gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketbazaar_coverage
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Wait for PostgreSQL
      run: |
        echo "Testing PostgreSQL connection..."
        for i in {1..30}; do
          if pg_isready -h localhost -p 5432 -U postgres; then
            echo "PostgreSQL is ready!"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "PostgreSQL failed to start within timeout"
            exit 1
          fi
          echo "Waiting for PostgreSQL... attempt $i/30"
          sleep 3
        done
        
        # Test actual database connection
        PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d ticketbazaar_coverage -c "SELECT 1;" || {
          echo "Database connection test failed"
          exit 1
        }
        
    - name: Setup test database
      run: |
        npm run db:push
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_coverage
        
    - name: Run unit tests with coverage
      run: |
        npm test -- --coverage
        echo "✅ Unit tests completed"
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_coverage
        
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
      
    - name: E2E test validation
      run: |
        # Start server in background
        npm run dev &
        SERVER_PID=$!
        
        # Wait for server to be ready
        echo "Waiting for server to start..."
        for i in {1..30}; do
          if curl -f http://localhost:5000/api/health >/dev/null 2>&1; then
            echo "✅ Server is ready"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "❌ Server failed to start"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi
          sleep 2
        done
        
        # Seed database with test data
        npx tsx scripts/seed-users.ts
        npx tsx scripts/seed-realistic-events.ts
        
        # Run critical E2E test
        if npx playwright test tests/e2e/specs/01-homepage-navigation.spec.ts --project=chromium --reporter=line; then
          echo "✅ Critical E2E tests passed"
        else
          echo "⚠️ E2E tests failed but not blocking status check"
        fi
        
        # Clean up
        kill $SERVER_PID 2>/dev/null || true
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_coverage
        SESSION_SECRET: coverage-test-secret

  # Security compliance check
  security-compliance:
    name: Security Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Security scan
      run: |
        # Check for hardcoded secrets with proper regex
        SECRET_PATTERNS="password\s*=\s*['\"][^'\"]*['\"]|secret\s*=\s*['\"][^'\"]*['\"]|key\s*=\s*['\"][^'\"]*['\"]"
        if grep -rE "$SECRET_PATTERNS" --include="*.ts" --include="*.js" --exclude-dir=node_modules . | grep -v "test" | grep -v "example" | grep -v "placeholder" | grep -v "schema" > /dev/null; then
          echo "⚠️ Potential hardcoded secrets found - review required"
        else
          echo "✅ No obvious hardcoded secrets detected"
        fi
        
        # Check for console.log statements in production code (non-blocking)
        CONSOLE_FILES=$(find . -name "*.ts" -not -path "./node_modules/*" -not -path "./tests/*" -exec grep -l "console\.log" {} \; 2>/dev/null || true)
        if [ -n "$CONSOLE_FILES" ]; then
          echo "⚠️ Console.log statements found in production code (non-blocking)"
          echo "$CONSOLE_FILES"
        else
          echo "✅ No console.log statements in production code"
        fi
        
        # Check package.json for security
        if [ -f "package.json" ]; then
          if grep -q '"start".*"node"' package.json; then
            echo "✅ Production start script uses node"
          else
            echo "⚠️ Production start script check - verify configuration"
          fi
        fi



  # Status check summary
  status-check-summary:
    name: Status Check Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [branch-protection-check, code-quality-gates, test-coverage-gates, security-compliance]
    if: always()
    
    steps:
    - name: Generate status summary
      run: |
        echo "## Status Check Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Branch Protection Check
        BRANCH_RESULT="${{ needs.branch-protection-check.result }}"
        if [ "$BRANCH_RESULT" == "success" ]; then
          echo "✅ Branch Protection: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Branch Protection: FAILED ($BRANCH_RESULT)" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Code Quality Gates
        QUALITY_RESULT="${{ needs.code-quality-gates.result }}"
        if [ "$QUALITY_RESULT" == "success" ]; then
          echo "✅ Code Quality: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Code Quality: FAILED ($QUALITY_RESULT)" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Test Coverage Gates
        COVERAGE_RESULT="${{ needs.test-coverage-gates.result }}"
        if [ "$COVERAGE_RESULT" == "success" ]; then
          echo "✅ Test Coverage: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Test Coverage: FAILED ($COVERAGE_RESULT)" >> $GITHUB_STEP_SUMMARY
        fi
        
        # Security Compliance
        SECURITY_RESULT="${{ needs.security-compliance.result }}"
        if [ "$SECURITY_RESULT" == "success" ]; then
          echo "✅ Security Compliance: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Security Compliance: FAILED ($SECURITY_RESULT)" >> $GITHUB_STEP_SUMMARY
        fi
        
    - name: Final status check
      run: |
        BRANCH_RESULT="${{ needs.branch-protection-check.result }}"
        QUALITY_RESULT="${{ needs.code-quality-gates.result }}"
        COVERAGE_RESULT="${{ needs.test-coverage-gates.result }}"
        SECURITY_RESULT="${{ needs.security-compliance.result }}"
        
        echo "Job Results:"
        echo "- Branch Protection: $BRANCH_RESULT"
        echo "- Code Quality: $QUALITY_RESULT" 
        echo "- Test Coverage: $COVERAGE_RESULT"
        echo "- Security Compliance: $SECURITY_RESULT"
        
        if [ "$BRANCH_RESULT" != "success" ] || 
           [ "$QUALITY_RESULT" != "success" ] || 
           [ "$COVERAGE_RESULT" != "success" ] || 
           [ "$SECURITY_RESULT" != "success" ]; then
          echo "❌ One or more status checks failed"
          exit 1
        else
          echo "✅ All status checks passed"
        fi