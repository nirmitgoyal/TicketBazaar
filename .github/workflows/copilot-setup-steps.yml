name: "Copilot Setup Steps"

# This workflow is specifically designed for GitHub Copilot's Coding Agent
# to preinstall tools and dependencies in the agent's environment
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    name: 🤖 Preinstall Tools for Copilot Coding Agent
    runs-on: ubuntu-latest

    # Set minimal permissions as Copilot will be given its own token
    permissions:
      contents: read

    # PostgreSQL service for database operations
    services:
      postgres:
        image: postgres:17.4
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: ticketbazaar_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    # Steps to prepare the environment for Copilot Coding Agent
    steps:
      # =============================================================================
      # CORE ENVIRONMENT SETUP
      # =============================================================================
      
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔍 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install Dependencies
        run: |
          npm ci --prefer-offline --no-audit
          echo "✅ Node.js dependencies installed"

      - name: 🔧 Build TypeScript Types
        run: |
          npm run build:types
          echo "✅ TypeScript types package built"

      # =============================================================================
      # DATABASE PREPARATION
      # =============================================================================
      
      - name: 🗄️ Setup Database Environment
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_test
        run: |
          # Wait for PostgreSQL to be ready
          echo "Waiting for database connection..."
          npm run wait-for-db
          echo "✅ Database connection established"
          
          # Initialize database schema
          echo "Setting up database schema..."
          npm run db:push
          echo "✅ Database schema initialized"

      - name: 📊 Load Development Data
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_test
        run: |
          # Load test data if script exists
          if [ -f "scripts/init-test-db.ts" ]; then
            echo "Loading test data..."
            npx tsx scripts/init-test-db.ts
            echo "✅ Test data loaded"
          else
            echo "ℹ️ No test data script found"
          fi
        continue-on-error: true

      # =============================================================================
      # TESTING TOOLS SETUP
      # =============================================================================
      
      - name: 🎭 Install Playwright Browsers
        run: |
          echo "Installing Playwright browsers..."
          npx playwright install chromium firefox webkit --with-deps
          echo "✅ Playwright browsers installed"

      - name: 🧪 Verify Testing Environment
        run: |
          echo "Verifying testing setup..."
          npx playwright --version
          echo "✅ Testing environment ready"

      # =============================================================================
      # BUILD TOOLS PREPARATION
      # =============================================================================
      
      - name: 🏗️ Warm Up Build Tools
        run: |
          echo "Warming up build toolchain..."
          
          # Warm up Vite (client build)
          npm run build:client
          echo "🔥 Vite build tools ready"
          
          # Warm up ESBuild (server build)
          npm run build:server
          echo "🔥 ESBuild tools ready"
          
          echo "✅ All build tools warmed up"

      
      # =============================================================================
      # ADDITIONAL DEVELOPMENT TOOLS
      # =============================================================================
      
      - name: 🐍 Setup Python Tools
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: 📦 Install Python Development Tools
        run: |
          echo "Installing Python development tools..."
          python -m pip install --upgrade pip
          pip install black isort flake8 mypy
          echo "✅ Python tools installed"

      # =============================================================================
      # ENVIRONMENT VALIDATION & SUMMARY
      # =============================================================================
      
      - name: ✅ Environment Readiness Check
        run: |
          echo "=================================================="
          echo "🤖 GITHUB COPILOT CODING AGENT ENVIRONMENT READY"
          echo "=================================================="
          echo ""
          
          echo "📦 Runtime Environment:"
          echo "  • Node.js: $(node --version)"
          echo "  • npm: $(npm --version)"
          echo "  • Python: $(python --version)"
          echo ""
          
          echo "🏗️ Build Tools:"
          echo "  • TypeScript: $(npx tsc --version)"
          echo "  • Vite: $(npx vite --version)"
          echo "  • ESBuild: $(npx esbuild --version)"
          echo ""
          
          echo "🧪 Testing Tools:"
          echo "  • Playwright: $(npx playwright --version)"
          echo ""
          
          echo "🗄️ Database:"
          echo "  • PostgreSQL 17.4 (running on localhost:5432)"
          echo "  • Database: ticketbazaar_test"
          echo "  • Schema: Initialized with Drizzle ORM"
          echo ""
          
          echo "📂 Project Structure:"
          find . -maxdepth 2 -type d -name "src" -o -name "server" -o -name "client" -o -name "scripts" | sort
          echo ""
          
          echo "🎯 TicketBazaar Components Ready:"
          echo "  ✅ React + TypeScript Frontend (Vite)"
          echo "  ✅ Express.js + TypeScript Backend (ESBuild)"
          echo "  ✅ PostgreSQL Database + Drizzle ORM"
          echo "  ✅ Playwright E2E Testing Framework"
          echo "  ✅ Tailwind CSS Styling System"
          echo "  ✅ Authentication System (Passport.js)"
          echo "  ✅ Payment Integration (Stripe + Razorpay)"
          echo "  ✅ Code Quality Tools (ESLint + Prettier)"
          echo ""
          
          echo "🚀 Environment setup complete!"
          echo "🤖 GitHub Copilot Coding Agent is ready to work on TicketBazaar!"

      - name: 📚 Generate Copilot Development Guide
        run: |
          cat > COPILOT_DEVELOPMENT_GUIDE.md << 'EOF'
          # 🤖 GitHub Copilot Development Guide for TicketBazaar
          
          ## 🚀 Quick Start Commands
          
          ### Development
          ```bash
          npm run dev                 # Start development server
          npm run build              # Build for production
          npm run start              # Start production server
          ```
          
          ### Testing
          ```bash
          npm run test               # Run Playwright E2E tests
          npm run test:e2e-ui        # Run tests with UI
          ```
          
          ### Database
          ```bash
          npm run db:push            # Push schema changes
          npm run db:migrate         # Run migrations
          npm run wait-for-db        # Wait for database connection
          ```
          
        
          
          ## 🏗️ Architecture Overview
          
          ### Frontend (`client/`)
          - **Framework**: React 18 + TypeScript
          - **Build Tool**: Vite
          - **Styling**: Tailwind CSS + Radix UI components
          - **State Management**: React Query + Context
          - **Routing**: Wouter
          
          ### Backend (`server/`)
          - **Runtime**: Node.js 20 + Express.js
          - **Language**: TypeScript
          - **Build Tool**: ESBuild
          - **Authentication**: Passport.js (Google OAuth + Local)
          - **File Upload**: Multer
          
          ### Database
          - **Engine**: PostgreSQL 17.4
          - **ORM**: Drizzle ORM + Drizzle Kit
          - **Schema**: `shared/schema.ts`
          - **Migrations**: `migrations/` directory
          
          ### Testing
          - **Framework**: Playwright
          - **Tests**: `tests/e2e/` directory
          - **Browsers**: Chromium, Firefox, WebKit
          
          ## 🔧 Key Configuration Files
          
          - `package.json` - Dependencies and scripts
          - `tsconfig.json` - TypeScript configuration
          - `vite.config.ts` - Vite build configuration
          - `tailwind.config.ts` - Tailwind CSS configuration
          - `drizzle.config.ts` - Database configuration
          - `playwright.config.ts` - Test configuration
          
          ## 🎯 Main Features
          
          ### Event Management
          - Event creation and editing
          - Ticket generation with QR codes
          - Event discovery with geo-location
          - Real-time updates via WebSocket
          
          ### User System
          - Google OAuth authentication
          - Local email/password authentication
          - User profiles and preferences
          - Session management
          
          ### Payment Processing
          - Stripe integration (primary)
          - Razorpay integration (secondary)
          - Secure payment handling
          - Transaction tracking
          
          ### File Management
          - Image uploads for events
          - File storage optimization
          - Image processing and resizing
          
          ## 🗄️ Database Schema Key Tables
          
          - `users` - User accounts and profiles
          - `events` - Event information
          - `tickets` - Ticket records
          - `orders` - Purchase transactions
          - `sessions` - User sessions
          
          ## 🌍 Environment Variables
          
          Check `.env.example` for required environment variables:
          - `DATABASE_URL` - PostgreSQL connection
          - `SESSION_SECRET` - Session encryption
          - `GOOGLE_CLIENT_ID` & `GOOGLE_CLIENT_SECRET` - OAuth
          - `VITE_GOOGLE_MAPS_API_KEY` - Maps integration
          
          ## 🚨 Development Notes
          
          - Database URL: `postgresql://postgres:postgres@localhost:5432/ticketbazaar_test`
          - Development server runs on port 5000 (configurable)
          - Build outputs go to `dist/` directory
          - All API routes are in `server/routes/`
          - React components are in `client/src/components/`
          
          ---
          *Generated for GitHub Copilot Coding Agent Environment*
          EOF
          
          echo "📚 Development guide created: COPILOT_DEVELOPMENT_GUIDE.md"
          echo ""
          echo "🎉 Copilot environment preparation completed!"
          echo "🤖 The coding agent now has all tools and context needed!"
