name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

env:
  # Environment Configuration for TicketBazaar
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  
  # Tool Versions (pinned for consistency)
  PLAYWRIGHT_VERSION: '1.52.0'
  TYPESCRIPT_VERSION: '5.6.3'
  ESBUILD_VERSION: '0.25.5'
  VITE_VERSION: '5.4.19'
  
  # Database Configuration
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_test
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: ticketbazaar_test

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    name: � Setup TicketBazaar Development Environment
    runs-on: ubuntu-latest

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # Needed to clone the repository and install dependencies
      contents: read

    # PostgreSQL service for database operations
    services:
      postgres:
        image: postgres:17.4
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: ticketbazaar_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    # You can define any steps you want, and they will run before the agent starts.
    steps:
      # =============================================================================
      # CORE SETUP
      # =============================================================================
      
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔍 Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: 'package-lock.json'

      - name: 📦 Install JavaScript Dependencies
        run: |
          npm ci --prefer-offline --no-audit
          echo "✅ Node.js dependencies installed successfully"

      - name: 🔧 Build TypeScript Types Package
        run: |
          npm run build:types
          echo "✅ Types package built successfully"

      # =============================================================================
      # DATABASE SETUP
      # =============================================================================
      
      - name: �️ Setup Database Schema
        run: |
          # Wait for database to be ready
          npm run wait-for-db
          echo "✅ Database connection verified"
          
          # Initialize database schema using Drizzle
          npm run db:push
          echo "✅ Database schema initialized"

      - name: 📊 Load Test Data (Optional)
        run: |
          if [ -f "scripts/init-test-db.ts" ]; then
            npx tsx scripts/init-test-db.ts
            echo "✅ Test data loaded successfully"
          else
            echo "ℹ️ No test data script found, skipping"
          fi
        continue-on-error: true

      # =============================================================================
      # TESTING TOOLS SETUP
      # =============================================================================
      
      - name: 🎭 Install Playwright Browsers
        run: |
          # Install browsers for end-to-end testing
          npx playwright install chromium firefox webkit --with-deps
          echo "✅ Playwright browsers installed"

      - name: 🧪 Verify Testing Configuration
        run: |
          npx playwright --version
          npm run type-check
          echo "✅ Testing environment verified"

      # =============================================================================
      # BUILD TOOLS WARMUP
      # =============================================================================
      
      - name: 🏗️ Warm Up Build Tools
        run: |
          # Warm up TypeScript compiler
          echo "� Warming up TypeScript compiler..."
          npm run type-check
          
          # Test client build (Vite)
          echo "� Warming up Vite build..."
          npm run build:client
          
          # Test server build (ESBuild)
          echo "🔥 Warming up ESBuild..."
          npm run build:server
          
          echo "✅ Build tools warmed up successfully"

      # =============================================================================
      # CODE QUALITY TOOLS
      # =============================================================================
      
      - name: 🎨 Verify Code Quality Tools
        run: |
          # Test linting configuration
          npm run lint:check
          echo "✅ ESLint configuration verified"
          
          # Test formatting configuration
          npm run format:check
          echo "✅ Prettier configuration verified"

      # =============================================================================
      # PYTHON TOOLS (for auxiliary scripts)
      # =============================================================================
      
      - name: 🐍 Setup Python Development Tools
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install Python Development Tools
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 mypy
          echo "✅ Python development tools installed"

      # =============================================================================
      # ENVIRONMENT VALIDATION
      # =============================================================================
      
      - name: ✅ Environment Health Check
        run: |
          echo "=== 🤖 COPILOT CODING AGENT ENVIRONMENT READY ==="
          echo ""
          
          echo "📦 Node.js Environment:"
          echo "  Node.js: $(node --version)"
          echo "  npm: $(npm --version)"
          echo ""
          
          echo "🏗️ Build Tools:"
          echo "  TypeScript: $(npx tsc --version)"
          echo "  Vite: $(npx vite --version)"
          echo "  ESBuild: $(npx esbuild --version)"
          echo ""
          
          echo "🧪 Testing Tools:"
          echo "  Playwright: $(npx playwright --version)"
          echo ""
          
          echo "🐍 Python Tools:"
          echo "  Python: $(python --version)"
          echo ""
          
          echo "📊 Project Structure Verified:"
          find . -maxdepth 2 -type d -name "src" -o -name "server" -o -name "client" -o -name "scripts" | sort
          echo ""
          
          echo "🎯 Key Project Components:"
          echo "  ✅ React + TypeScript Frontend (Vite)"
          echo "  ✅ Express.js + TypeScript Backend (ESBuild)"
          echo "  ✅ PostgreSQL Database (Drizzle ORM)"
          echo "  ✅ Playwright E2E Testing"
          echo "  ✅ Tailwind CSS Styling"
          echo "  ✅ Authentication (Passport.js)"
          echo "  ✅ Payment Systems (Stripe, Razorpay)"
          echo ""
          
          echo "🚀 Environment setup completed successfully!"
          echo "🤖 Ready for GitHub Copilot Coding Agent development!"

      - name: 📋 Generate Development Quick Reference
        run: |
          cat > COPILOT_QUICK_REFERENCE.md << 'EOF'
          # 🤖 Copilot Development Quick Reference
          
          ## 🚀 Essential Commands
          ```bash
          # Start development server
          npm run dev
          
          # Build for production
          npm run build
          
          # Run end-to-end tests
          npm run test
          
          # Type checking
          npm run type-check
          
          # Code formatting
          npm run format
          
          # Database operations
          npm run db:push        # Push schema changes
          npm run db:migrate     # Run migrations
          ```
          
          ## 🏗️ Project Architecture
          - **Frontend**: `client/src/` - React + TypeScript + Vite + Tailwind
          - **Backend**: `server/` - Express.js + TypeScript + Node.js
          - **Database**: PostgreSQL 17.4 + Drizzle ORM
          - **Types**: `packages/types/` - Shared TypeScript definitions
          - **Scripts**: `scripts/` - Database & utility scripts
          - **Tests**: `tests/e2e/` - Playwright end-to-end tests
          
          ## � Development Notes
          - Database URL: `postgresql://postgres:postgres@localhost:5432/ticketbazaar_test`
          - Build outputs: `dist/` directory
          - Environment variables: Check `.env` files
          - API routes: `server/routes/`
          - Components: `client/src/components/`
          
          ## 🎯 Key Features to Understand
          - Multi-tenant event ticketing platform
          - Google OAuth + Local authentication
          - Stripe & Razorpay payment integration
          - QR code ticket generation
          - Geo-location based event discovery
          - Real-time WebSocket updates
          
          ---
          *Generated for GitHub Copilot Coding Agent*
          EOF
          
          echo "📋 Quick reference guide created: COPILOT_QUICK_REFERENCE.md"
          echo ""
          echo "🎉 All setup steps completed successfully!"
          echo "🤖 GitHub Copilot Coding Agent can now work efficiently on this project!"
