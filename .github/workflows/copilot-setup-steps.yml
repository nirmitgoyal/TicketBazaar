name: Copilot Coding Agent Environment Setup

# This workflow is designed to preinstall tools and dependencies
# specifically for GitHub Copilot's Coding Agent environment
# to ensure a consistent and efficient development experience.

on:
  workflow_dispatch:
    inputs:
      setup_type:
        description: 'Type of setup to perform'
        required: true
        default: 'full'
        type: choice
        options:
        - full
        - minimal
        - testing-only
        - database-only
  push:
    branches: [ main ]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/copilot-setup-steps.yml'

env:
  # Environment Configuration
  NODE_VERSION: '20'
  NPM_VERSION: '10'
  PYTHON_VERSION: '3.11'
  
  # Tool Versions (pinned for consistency)
  PLAYWRIGHT_VERSION: '1.52.0'
  TYPESCRIPT_VERSION: '5.6.3'
  ESBUILD_VERSION: '0.25.5'
  VITE_VERSION: '5.4.19'
  
  # Caching Configuration
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
  TOOLS_CACHE_KEY: copilot-tools-v1
  
  # Database Configuration
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_test
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: ticketbazaar_test

jobs:
  # =============================================================================
  # CORE ENVIRONMENT SETUP
  # =============================================================================
  
  environment-setup:
    name: 🔧 Core Environment Setup
    runs-on: ubuntu-latest
    outputs:
      node-cache-hit: ${{ steps.node-cache.outputs.cache-hit }}
      tools-cache-hit: ${{ steps.tools-cache.outputs.cache-hit }}
      setup-type: ${{ inputs.setup_type || 'full' }}
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    
    - name: 🔍 Setup Node.js Runtime
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'
    
    - name: 📋 Verify Node.js and npm versions
      run: |
        echo "Node.js version: $(node --version)"
        echo "npm version: $(npm --version)"
        echo "Setup type: ${{ inputs.setup_type || 'full' }}"
    
    - name: 💾 Cache Node.js Dependencies
      id: node-cache
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          packages/*/node_modules
          ~/.npm
        key: node-modules-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          node-modules-
    
    - name: 📦 Install Dependencies
      if: steps.node-cache.outputs.cache-hit != 'true'
      run: |
        npm ci --prefer-offline --no-audit
        echo "✅ Dependencies installed successfully"
    
    - name: 🧰 Cache Development Tools
      id: tools-cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/typescript
          ~/.cache/esbuild
          ~/.vite
          node_modules/.vite
        key: ${{ env.TOOLS_CACHE_KEY }}-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ env.TOOLS_CACHE_KEY }}-

  # =============================================================================
  # DATABASE SETUP
  # =============================================================================
  
  database-setup:
    name: 🗄️ Database Environment Setup
    runs-on: ubuntu-latest
    needs: environment-setup
    if: contains(fromJSON('["full", "database-only"]'), needs.environment-setup.outputs.setup-type)
    
    services:
      postgres:
        image: postgres:17.4
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
    
    - name: 🔍 Setup Node.js Runtime
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: 📦 Restore Node.js Dependencies
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          packages/*/node_modules
        key: node-modules-${{ hashFiles('package-lock.json') }}
        fail-on-cache-miss: true
    
    - name: 🔗 Verify Database Connection
      run: |
        npm run wait-for-db
        echo "✅ Database connection verified"
    
    - name: 🏗️ Setup Database Schema
      run: |
        npm run db:push
        echo "✅ Database schema initialized"
    
    - name: 📊 Load Test Data (if available)
      run: |
        if [ -f "scripts/init-test-db.ts" ]; then
          npm run build:types
          npx tsx scripts/init-test-db.ts
          echo "✅ Test data loaded"
        else
          echo "ℹ️ No test data script found, skipping"
        fi
      continue-on-error: true

  # =============================================================================
  # TESTING TOOLS SETUP
  # =============================================================================
  
  testing-setup:
    name: 🧪 Testing Environment Setup
    runs-on: ubuntu-latest
    needs: environment-setup
    if: contains(fromJSON('["full", "testing-only"]'), needs.environment-setup.outputs.setup-type)
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
    
    - name: 🔍 Setup Node.js Runtime
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: 📦 Restore Node.js Dependencies
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          packages/*/node_modules
        key: node-modules-${{ hashFiles('package-lock.json') }}
        fail-on-cache-miss: true
    
    - name: 💾 Cache Playwright Browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
        key: playwright-browsers-${{ env.PLAYWRIGHT_VERSION }}-${{ runner.os }}
        restore-keys: |
          playwright-browsers-${{ env.PLAYWRIGHT_VERSION }}-
          playwright-browsers-
    
    - name: 🎭 Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: |
        npx playwright install chromium firefox webkit --with-deps
        echo "✅ Playwright browsers installed"
    
    - name: 🔍 Verify Playwright Installation
      run: |
        npx playwright --version
        echo "✅ Playwright installation verified"
    
    - name: 📋 Run Test Configuration Check
      run: |
        npm run type-check
        echo "✅ TypeScript configuration validated"

  # =============================================================================
  # BUILD TOOLS SETUP
  # =============================================================================
  
  build-tools-setup:
    name: 🏗️ Build Tools Setup
    runs-on: ubuntu-latest
    needs: environment-setup
    if: contains(fromJSON('["full", "minimal"]'), needs.environment-setup.outputs.setup-type)
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
    
    - name: 🔍 Setup Node.js Runtime
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: 📦 Restore Node.js Dependencies
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          packages/*/node_modules
        key: node-modules-${{ hashFiles('package-lock.json') }}
        fail-on-cache-miss: true
    
    - name: 🧰 Restore Build Tools Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/typescript
          ~/.cache/esbuild
          ~/.vite
          node_modules/.vite
        key: ${{ env.TOOLS_CACHE_KEY }}-${{ hashFiles('package-lock.json') }}
    
    - name: 🔨 Warm Up Build Tools
      run: |
        # Build types package first
        npm run build:types
        echo "✅ Types package built"
        
        # Warm up TypeScript compiler
        npm run type-check
        echo "✅ TypeScript compiler warmed up"
        
        # Warm up Vite build
        npm run build:client
        echo "✅ Vite build cache warmed up"
        
        # Warm up esbuild
        npm run build:server
        echo "✅ ESBuild cache warmed up"
    
    - name: 🎨 Setup Code Quality Tools
      run: |
        # Test linting
        npm run lint:check
        echo "✅ ESLint configuration verified"
        
        # Test formatting
        npm run format:check
        echo "✅ Prettier configuration verified"

  # =============================================================================
  # PYTHON TOOLS SETUP (for auxiliary scripts)
  # =============================================================================
  
  python-setup:
    name: 🐍 Python Tools Setup
    runs-on: ubuntu-latest
    needs: environment-setup
    if: needs.environment-setup.outputs.setup-type == 'full'
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: 📦 Install Python Development Tools
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 mypy
        echo "✅ Python development tools installed"
    
    - name: 🔍 Verify Python Installation
      run: |
        python --version
        pip --version
        echo "✅ Python installation verified"

  # =============================================================================
  # VALIDATION AND SUMMARY
  # =============================================================================
  
  validation-and-summary:
    name: ✅ Environment Validation & Summary
    runs-on: ubuntu-latest
    needs: [environment-setup, database-setup, testing-setup, build-tools-setup, python-setup]
    if: always()
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
    
    - name: 🔍 Setup Node.js Runtime
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: 📦 Restore Dependencies
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          packages/*/node_modules
        key: node-modules-${{ hashFiles('package-lock.json') }}
        fail-on-cache-miss: true
    
    - name: 🔬 Environment Health Check
      run: |
        echo "=== COPILOT CODING AGENT ENVIRONMENT HEALTH CHECK ==="
        echo ""
        
        echo "📦 Node.js Environment:"
        node --version
        npm --version
        echo ""
        
        echo "🔧 Project Dependencies:"
        npm list --depth=0 | head -20
        echo ""
        
        echo "🏗️ Build Tools:"
        npx tsc --version
        npx vite --version
        npx esbuild --version
        echo ""
        
        echo "🧪 Testing Tools:"
        if command -v npx playwright &> /dev/null; then
          npx playwright --version
        else
          echo "Playwright not available in this setup type"
        fi
        echo ""
        
        echo "📊 Project Structure:"
        find . -maxdepth 2 -type d -name "src" -o -name "server" -o -name "client" -o -name "scripts" | sort
        echo ""
        
        echo "✅ Environment setup completed successfully!"
        echo "🤖 Ready for GitHub Copilot Coding Agent development!"
    
    - name: 📋 Generate Setup Summary
      run: |
        cat > copilot-setup-summary.md << 'EOF'
        # GitHub Copilot Coding Agent Environment Setup Summary
        
        ## 🎯 Setup Completed
        - **Setup Type**: ${{ needs.environment-setup.outputs.setup-type }}
        - **Node.js Version**: ${{ env.NODE_VERSION }}
        - **Timestamp**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        
        ## 🧰 Tools Available
        - ✅ Node.js & npm
        - ✅ TypeScript (${{ env.TYPESCRIPT_VERSION }})
        - ✅ Vite (${{ env.VITE_VERSION }})
        - ✅ ESBuild (${{ env.ESBUILD_VERSION }})
        - ✅ Drizzle ORM
        - ✅ ESLint & Prettier
        EOF
        
        if [[ "${{ needs.testing-setup.result }}" == "success" ]]; then
          echo "        - ✅ Playwright (${{ env.PLAYWRIGHT_VERSION }})" >> copilot-setup-summary.md
        fi
        
        if [[ "${{ needs.database-setup.result }}" == "success" ]]; then
          echo "        - ✅ PostgreSQL 17.4" >> copilot-setup-summary.md
        fi
        
        if [[ "${{ needs.python-setup.result }}" == "success" ]]; then
          echo "        - ✅ Python (${{ env.PYTHON_VERSION }})" >> copilot-setup-summary.md
        fi
        
        cat >> copilot-setup-summary.md << 'EOF'
        
        ## 🚀 Quick Start Commands
        ```bash
        # Development server
        npm run dev
        
        # Build project
        npm run build
        
        # Run tests
        npm run test
        
        # Type checking
        npm run type-check
        
        # Code formatting
        npm run format
        
        # Database operations
        npm run db:push
        ```
        
        ## 🔧 Project Architecture
        - **Frontend**: React + TypeScript + Vite + Tailwind CSS
        - **Backend**: Express.js + TypeScript + Node.js
        - **Database**: PostgreSQL + Drizzle ORM
        - **Testing**: Playwright
        - **Build**: Vite (client) + ESBuild (server)
        - **Authentication**: Passport.js (Google OAuth)
        
        ---
        *Generated by GitHub Copilot Environment Setup Workflow*
        EOF
        
        echo "📋 Setup summary generated"
        cat copilot-setup-summary.md
    
    - name: 📤 Upload Setup Summary
      uses: actions/upload-artifact@v4
      with:
        name: copilot-setup-summary
        path: copilot-setup-summary.md
        retention-days: 30

  # =============================================================================
  # CLEANUP AND OPTIMIZATION
  # =============================================================================
  
  cleanup-and-optimization:
    name: 🧹 Cleanup & Optimization
    runs-on: ubuntu-latest
    needs: [environment-setup, validation-and-summary]
    if: always() && contains(fromJSON('["full"]'), needs.environment-setup.outputs.setup-type)
    
    steps:
    - name: 🧹 Cleanup Temporary Files
      run: |
        # Clean npm cache
        npm cache clean --force 2>/dev/null || true
        
        # Clean temporary directories
        rm -rf /tmp/npm-* 2>/dev/null || true
        rm -rf ~/.npm/_logs 2>/dev/null || true
        
        echo "✅ Cleanup completed"
    
    - name: 📊 Report Cache Usage
      run: |
        echo "=== CACHE USAGE REPORT ==="
        echo "Node modules cache: node-modules-${{ hashFiles('package-lock.json') }}"
        echo "Tools cache: ${{ env.TOOLS_CACHE_KEY }}"
        echo "Playwright cache: playwright-browsers-${{ env.PLAYWRIGHT_VERSION }}"
        echo ""
        echo "💡 These caches will be reused in future Copilot sessions"
        echo "🚀 Next environment setup will be significantly faster!"
