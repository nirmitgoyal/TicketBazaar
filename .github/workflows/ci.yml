
name: Node.js CI with E2E Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_ENV: test
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
  GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

jobs:
  # Unit and Integration Tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketbazaar_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Setup test database
      run: |
        npm run db:push
        npm run seed:users
        npm run seed:events
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_test
        
    - name: Run unit tests
      run: npm test
      
    - name: Run TypeScript type checking
      run: npm run check

  # End-to-End Tests
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketbazaar_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}
      
    - name: Setup test database
      run: |
        npm run db:push
        npm run seed:users
        npm run seed:events
        npm run seed:tickets
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_e2e
        
    - name: Start application server
      run: |
        npm run dev &
        sleep 30
        curl --retry 10 --retry-connrefused --retry-delay 5 http://localhost:5000/api/health
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_e2e
        SESSION_SECRET: test-session-secret
        GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        
    - name: Run E2E tests
      run: npx playwright test --project=${{ matrix.browser }} --reporter=html
      env:
        CI: true
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30
        
    - name: Upload test videos
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-videos-${{ matrix.browser }}
        path: test-results/
        retention-days: 30

  # Mobile E2E Tests
  mobile-e2e-tests:
    name: Mobile E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketbazaar_mobile
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      fail-fast: false
      matrix:
        device: ['Mobile Chrome', 'Mobile Safari']
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium webkit
      
    - name: Setup test database
      run: |
        npm run db:push
        npm run seed:users
        npm run seed:events
        npm run seed:tickets
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_mobile
        
    - name: Start application server
      run: |
        npm run dev &
        sleep 30
        curl --retry 10 --retry-connrefused --retry-delay 5 http://localhost:5000/api/health
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_mobile
        SESSION_SECRET: test-session-secret
        GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        
    - name: Run Mobile E2E tests
      run: npx playwright test --project="${{ matrix.device }}" --reporter=html
      env:
        CI: true
        
    - name: Upload mobile test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-mobile-report-${{ matrix.device }}
        path: playwright-report/
        retention-days: 30

  # Accessibility Tests (Performance tests removed)
  accessibility-tests:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketbazaar_a11y
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
      
    - name: Setup test database
      run: |
        npm run db:push
        npm run seed:users
        npm run seed:events
        npm run seed:tickets
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_a11y
        
    - name: Start application server
      run: |
        npm run dev &
        sleep 30
        curl --retry 10 --retry-connrefused --retry-delay 5 http://localhost:5000/api/health
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_a11y
        SESSION_SECRET: test-session-secret
        GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        
    - name: Run Accessibility Tests
      run: npx playwright test tests/e2e/specs/09-accessibility-only.spec.ts --project=chromium --reporter=html
      env:
        CI: true
        
    - name: Upload accessibility test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: accessibility-test-report
        path: playwright-report/
        retention-days: 30

  # Build verification
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, mobile-e2e-tests, accessibility-tests]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: dist/
        retention-days: 7
