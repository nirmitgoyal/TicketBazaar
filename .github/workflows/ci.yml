  report-results:
    runs-on: ubuntu-latest
    needs: [test-navigation, test-forms, test-realtime, test-ui-interactions, test-error-handling, test-user-journeys]
    if: always()
    steps:
    - name: Download all test results
      uses: actions/download-artifact@v4
      with:
        path: all-test-results

    - name: Generate test report
      run: |
        echo "# E2E Test Results Summary" > test-report.md
        echo "" >> test-report.md
        echo "## Test Execution Results" >> test-report.md
        echo "" >> test-report.md
        
        # Count test artifacts to determine pass/fail status
        total_tests=0
        passed_tests=0
        
        for dir in all-test-results/*/; do
          if [ -d "$dir" ]; then
            total_tests=$((total_tests + 1))
            if ls "$dir"*.json >/dev/null 2>&1; then
              passed_tests=$((passed_tests + 1))
            fi
          fi
        done
        
        echo "- Total Test Suites: $total_tests" >> test-report.md
        echo "- Passed: $passed_tests" >> test-report.md
        echo "- Failed: $((total_tests - passed_tests))" >> test-report.md
        echo "" >> test-report.md
        
        if [ $passed_tests -eq $total_tests ]; then
          echo "✅ All tests passed successfully" >> test-report.md
        else
          echo "❌ Some tests failed - please review test artifacts" >> test-report.md
        fi

    - name: Upload consolidated report
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: test-report.md
        retention-days: 30