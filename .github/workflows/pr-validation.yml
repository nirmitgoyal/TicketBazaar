name: PR Validation with E2E Tests

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]

env:
  NODE_ENV: test

jobs:
  # Quick validation tests that run on every PR
  quick-validation:
    name: Quick Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: TypeScript type checking
      run: npm run check
      
    - name: Lint check
      run: |
        if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f "eslint.config.js" ]; then
          npx eslint . --ext .ts,.tsx,.js,.jsx
        else
          echo "No ESLint configuration found, skipping..."
        fi
      continue-on-error: true
      
    - name: Build verification
      run: npm run build

  # Core E2E tests for critical functionality
  critical-e2e-tests:
    name: Critical E2E Tests
    runs-on: ubuntu-latest
    needs: quick-validation
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketbazaar_pr
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
      
    - name: Setup test database
      run: |
        npm run db:push
        npm run seed:users
        npm run seed:events
        npm run seed:tickets
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_pr
        
    - name: Start application server
      run: |
        npm run dev &
        sleep 30
        curl --retry 10 --retry-connrefused --retry-delay 5 http://localhost:5000/api/health
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_pr
        SESSION_SECRET: test-session-secret-pr
        
    - name: Run critical user flows
      run: |
        npx playwright test tests/e2e/specs/01-homepage-navigation.spec.ts --project=chromium --reporter=line
        npx playwright test tests/e2e/specs/03-search-and-filters.spec.ts --project=chromium --reporter=line
        npx playwright test tests/e2e/specs/08-ticket-purchase-flow.spec.ts --project=chromium --reporter=line
      env:
        CI: true
        
    - name: Upload critical test results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: critical-test-failures
        path: test-results/
        retention-days: 7

  # Security validation (performance tests removed)
  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    needs: quick-validation

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Security audit
      run: npm audit --audit-level=moderate
      continue-on-error: true
      
    - name: Check for hardcoded secrets
      run: |
        if grep -r "password\|secret\|key" --include="*.ts" --include="*.js" --exclude-dir=node_modules . | grep -v "test" | grep -v "example"; then
          echo "⚠️ Potential hardcoded secrets found - review required"
        else
          echo "✅ No obvious hardcoded secrets detected"
        fi

  # Mobile compatibility check
  mobile-compatibility:
    name: Mobile Compatibility
    runs-on: ubuntu-latest
    needs: critical-e2e-tests
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ticketbazaar_mobile_pr
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium webkit
      
    - name: Setup test database
      run: |
        npm run db:push
        npm run seed:users
        npm run seed:events
        npm run seed:tickets
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_mobile_pr
        
    - name: Start application server
      run: |
        npm run dev &
        sleep 30
        curl --retry 10 --retry-connrefused --retry-delay 5 http://localhost:5000/api/health
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ticketbazaar_mobile_pr
        SESSION_SECRET: test-session-secret-mobile
        
    - name: Run mobile compatibility tests
      run: |
        npx playwright test tests/e2e/specs/01-homepage-navigation.spec.ts --project="Mobile Chrome" --reporter=line
        npx playwright test tests/e2e/specs/08-ticket-purchase-flow.spec.ts --project="Mobile Chrome" --reporter=line
      env:
        CI: true
        
    - name: Upload mobile test results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: mobile-compatibility-failures
        path: test-results/
        retention-days: 7

  # PR validation summary
  pr-validation-summary:
    name: PR Validation Summary
    runs-on: ubuntu-latest
    needs: [quick-validation, critical-e2e-tests, security-check, mobile-compatibility]
    if: always()
    
    steps:
    - name: Validation Summary
      run: |
        echo "## PR Validation Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Test Results:" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ needs.quick-validation.result }}" == "success" ]; then
          echo "✅ Quick Validation: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Quick Validation: FAILED" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ needs.critical-e2e-tests.result }}" == "success" ]; then
          echo "✅ Critical E2E Tests: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Critical E2E Tests: FAILED" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ needs.security-check.result }}" == "success" ]; then
          echo "✅ Security Check: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Security Check: FAILED" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ needs.mobile-compatibility.result }}" == "success" ]; then
          echo "✅ Mobile Compatibility: PASSED" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Mobile Compatibility: FAILED" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
        echo "- Review any failed tests above" >> $GITHUB_STEP_SUMMARY
        echo "- Check uploaded artifacts for detailed failure reports" >> $GITHUB_STEP_SUMMARY
        echo "- Ensure all validations pass before merging" >> $GITHUB_STEP_SUMMARY
        
    - name: Check if all validations passed
      run: |
        if [ "${{ needs.quick-validation.result }}" != "success" ] || 
           [ "${{ needs.critical-e2e-tests.result }}" != "success" ] || 
           [ "${{ needs.security-check.result }}" != "success" ] || 
           [ "${{ needs.mobile-compatibility.result }}" != "success" ]; then
          echo "❌ Some validations failed. Please review and fix before merging."
          exit 1
        else
          echo "✅ All PR validations passed successfully!"
        fi